version: "3.9"

services:
  # Laravel backend
  laravel_app:
    build:
      context: ./universiteti-backend
      dockerfile: Dockerfile
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./universiteti-backend:/var/www
    restart: always
    ports:
      - "8000:8000"   # access Laravel on localhost:8000
    depends_on:
      - laravel_db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: laravel_db
      DB_PORT: 3306
      DB_DATABASE: universiteti_db
      DB_USERNAME: appuser
      DB_PASSWORD: apppassword
      DB_SSL: false      # disable SSL for development
    command: php artisan serve --host=0.0.0.0 --port=8000

  # MySQL database
  laravel_db:
    image: mysql:8
    container_name: laravel_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: universiteti_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3307:3306"   # host port mapping
    volumes:
      - ./mysql_data:/var/lib/mysql 
    restart: always     # <-- important, auto-restarts if it crashes

  # React frontend
  react_app:
    build:
      context: ./universiteti-frontend
      dockerfile: Dockerfile
    container_name: react_app
    working_dir: /app
    volumes:
      - ./universiteti-frontend:/app
      - /app/node_modules
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - laravel_app
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_HOST=0.0.0.0
      - WDS_SOCKET_PORT=3000
      - FAST_REFRESH=true
    command: "npm start"

volumes:
  db_data: